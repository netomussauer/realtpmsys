version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/persistence/sqlc/queries"
    schema:  "migrations"
    gen:
      go:
        package:              "sqlcgen"
        out:                  "internal/infrastructure/persistence/sqlc"
        sql_package:          "pgx/v5"
        emit_json_tags:       true
        emit_db_tags:         true
        emit_prepared_queries: false
        emit_interface:       false
        emit_exact_table_names: false
        emit_empty_slices:    true
        emit_result_struct_pointers: false
        emit_params_struct_pointers: false
        emit_methods_with_db_argument: false
        emit_pointers_for_null_types: true
        query_parameter_limit: 1
        overrides:
          # ── UUID ──────────────────────────────────────────────────────────
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type:   "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import:  "github.com/google/uuid"
              type:    "UUID"
              pointer: true

          # ── DECIMAL / NUMERIC ─────────────────────────────────────────────
          - db_type: "pg_catalog.numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type:   "Decimal"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              import:  "github.com/shopspring/decimal"
              type:    "Decimal"
              pointer: true

          # ── TIMESTAMPTZ / DATE ────────────────────────────────────────────
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type:    "time.Time"
              pointer: true
          - db_type: "timestamp with time zone"
            go_type: "time.Time"
          - db_type: "timestamp with time zone"
            nullable: true
            go_type:
              type:    "time.Time"
              pointer: true
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "date"
            nullable: true
            go_type:
              type:    "time.Time"
              pointer: true

          # ── ENUMS → string (preserva valores no domínio) ──────────────────
          - db_type: "status_mensalidade"
            go_type: "string"
          - db_type: "status_contrato"
            go_type: "string"
          - db_type: "status_atleta"
            go_type: "string"
          - db_type: "status_treinador"
            go_type: "string"
          - db_type: "status_turma"
            go_type: "string"
          - db_type: "status_matricula"
            go_type: "string"
          - db_type: "perfil_usuario"
            go_type: "string"
          - db_type: "parentesco"
            go_type: "string"
          - db_type: "dia_semana"
            go_type: "string"
          - db_type: "presenca"
            go_type: "string"
